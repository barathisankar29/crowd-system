<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Crowd Monitoring System</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f17;
    color: white;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    width: 200px;
    height: 100%;
    background: #111827;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
}

.sidebar button {
    width: 100%;
    margin: 10px 0;
    padding: 10px;
    background: #1f2937;
    border: none;
    color: white;
    cursor: pointer;
}

/* MAIN */
.main {
    margin-left: 220px;
    padding: 20px;
}

/* PAGE */
.page {
    display: none;
}
.page.active {
    display: block;
}

/* CARDS */
.card {
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
    margin: 10px;
    display: inline-block;
    width: 22%;
    text-align: center;
}

/* CAMERA */
.camera {
    background: black;
    height: 400px;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
}

#videoFeed {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ALERT */
#alert {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    font-size: 30px;
}
</style>

</head>

<body>

<!-- ALERT -->
<div id="alert">
    🚨 OVERCROWD DETECTED 🚨
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>System</h2>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('camera')">Camera</button>
    <button onclick="showPage('analytics')">Analytics</button>
    <button onclick="showPage('settings')">Settings</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
    <h1>Dashboard</h1>

    <div class="card">
        <h3>People Count</h3>
        <p id="count">0</p>
    </div>

    <div class="card">
        <h3>Density</h3>
        <p id="density">0%</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p id="growth">0%</p>
    </div>

    <div class="card">
        <h3>Status</h3>
        <p id="status">SAFE</p>
    </div>
</div>

<!-- CAMERA -->
<div id="camera" class="page">
    <h1>Live Camera</h1>

    <div class="camera">
        <img id="videoFeed" src="">
    </div>

    <br>
    <button onclick="startCamera()">Start</button>
    <button onclick="stopCamera()">Stop</button>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="page">
    <h1>Heatmap</h1>
    <img id="heatmap" style="width:100%;">
</div>

<!-- SETTINGS -->
<div id="settings" class="page">
    <h1>Settings</h1>
    <button onclick="alert('System Reset')">Reset System</button>
</div>

</div>

<script>
const BASE = "http://127.0.0.1:5000";

/* NAVIGATION */
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* CAMERA */
function startCamera() {
    document.getElementById("videoFeed").src = BASE + "/video_feed";
}

function stopCamera() {
    document.getElementById("videoFeed").src = "";
}

/* FETCH DATA */
async function fetchData() {
    try {
        const res = await fetch(BASE + "/status");
        const data = await res.json();

        document.getElementById("count").innerText = data.count;
        document.getElementById("density").innerText = data.density + "%";
        document.getElementById("growth").innerText = data.growth_rate + "%";

        let status = document.getElementById("status");

        if (data.density > 80) {
            status.innerText = "CRITICAL";
            document.getElementById("alert").style.display = "flex";
        } 
        else if (data.density > 50) {
            status.innerText = "HIGH";
            document.getElementById("alert").style.display = "none";
        } 
        else {
            status.innerText = "SAFE";
            document.getElementById("alert").style.display = "none";
        }

        document.getElementById("heatmap").src = BASE + "/heatmap?" + new Date().getTime();

    } catch (e) {
        console.log("Error:", e);
    }
}

/* AUTO REFRESH */
setInterval(fetchData, 2000);
</script>

</body>
</html>
